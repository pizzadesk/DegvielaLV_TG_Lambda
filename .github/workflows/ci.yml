name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile source
        run: |
          python -m compileall -q lambda_function.py fuel_price_telegram_bot

      - name: Import smoke test
        run: |
          python -c "import lambda_function; import fuel_price_telegram_bot.bot; import fuel_price_telegram_bot.scraper; print('smoke ok')"
