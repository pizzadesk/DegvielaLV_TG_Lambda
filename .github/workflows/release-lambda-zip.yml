name: Release Lambda Zip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          [[ "$VERSION" == v* ]] || VERSION="v$VERSION"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and validate
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m compileall -q lambda_function.py fuel_price_telegram_bot
          python -c "import lambda_function; import fuel_price_telegram_bot.bot; import fuel_price_telegram_bot.scraper; print('smoke ok')"

      - name: Build Lambda package
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .build_lambda lambda-deployment.zip
          mkdir -p .build_lambda
          python -m pip install -r requirements.txt -t .build_lambda
          cp lambda_function.py .build_lambda/
          cp -r fuel_price_telegram_bot .build_lambda/
          cd .build_lambda
          zip -r ../lambda-deployment.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: lambda-deployment.zip
          generate_release_notes: true
